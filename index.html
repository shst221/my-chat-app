<!DOCTYPE html>
<html>
<head>
  <title>My Chat App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #313338; color: #dcddde; display: flex; height: 100vh; }

    /* Modal */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    #modal { background: #2b2d31; padding: 32px; border-radius: 12px; width: 340px; display: flex; flex-direction: column; gap: 16px; }
    #modal h2 { color: white; font-size: 20px; }
    #modal p { color: #949ba4; font-size: 14px; }
    #modal input { background: #1e1f22; border: none; outline: none; color: white; padding: 12px; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; }
    #modal button { background: #5865f2; border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 600; }
    #modal button:hover { background: #4752c4; }
    #modal-error { color: #f04747; font-size: 13px; display: none; }

    /* Layout */
    #sidebar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; }
    #server-name { padding: 16px; font-weight: 600; color: white; border-bottom: 1px solid #1e1f22; }
    #channels-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .channel { padding: 8px 16px; cursor: pointer; border-radius: 4px; margin: 2px 8px; color: #949ba4; display: flex; justify-content: space-between; align-items: center; }
    .channel:hover { background: #35373c; color: white; }
    .channel.active { background: #404249; color: white; }
    .channel span { font-size: 11px; color: #f04747; cursor: pointer; display: none; }
    .channel:hover span { display: inline; }
    #add-channel { padding: 12px 16px; border-top: 1px solid #1e1f22; display: flex; gap: 8px; }
    #add-channel input { flex: 1; background: #1e1f22; border: none; outline: none; color: white; padding: 8px; border-radius: 4px; font-size: 13px; font-family: 'Inter', sans-serif; }
    #add-channel button { background: #5865f2; border: none; color: white; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }

    /* Chat */
    #chat { flex: 1; display: flex; flex-direction: column; }
    #chat-header { padding: 16px; border-bottom: 1px solid #1e1f22; font-weight: 600; color: white; }
    #messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865f2; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; flex-shrink: 0; }
    .msg-content .username { font-weight: 600; color: white; font-size: 14px; }
    .msg-content .text { color: #dcddde; font-size: 14px; margin-top: 2px; }
    #input-area { padding: 16px; }
    #input-box { display: flex; background: #383a40; border-radius: 8px; padding: 12px; gap: 8px; }
    #input-box input { flex: 1; background: none; border: none; outline: none; color: white; font-size: 14px; font-family: 'Inter', sans-serif; }
    #input-box input::placeholder { color: #6d6f78; }
    #input-box button { background: #5865f2; border: none; color: white; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif; }
    #input-box button:hover { background: #4752c4; }
  </style>
</head>
<body>

  <!-- Login Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>Welcome! 👋</h2>
      <p>Enter your username and the server password</p>
      <input type="text" id="username-input" placeholder="Username" maxlength="20" />
      <input type="password" id="password-input" placeholder="Password" />
      <div id="modal-error">❌ Wrong password!</div>
      <button onclick="setUsername()">Let's go!</button>
    </div>
  </div>

  <div id="sidebar">
    <div id="server-name">My Server</div>
    <div id="channels-list"></div>
    <div id="add-channel">
      <input type="text" id="new-channel-input" placeholder="New channel..." maxlength="20" />
      <button onclick="addChannel()">+</button>
    </div>
  </div>

  <div id="chat">
    <div id="chat-header"># general</div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="input-box">
        <input type="text" id="msg-input" placeholder="Message #general" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, where, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2_w10P5wW7obTxGhmA5XnqRDNfFHYXhI",
      authDomain: "my-chat-app-83a2c.firebaseapp.com",
      projectId: "my-chat-app-83a2c",
      storageBucket: "my-chat-app-83a2c.firebasestorage.app",
      messagingSenderId: "791155570997",
      appId: "1:791155570997:web:9f13da72dd997b9084347c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const SERVER_PASSWORD = "roblox123"; // 👈 Change this to whatever you want!

    let currentUser = '';
    let currentChannel = 'general';
    let unsubscribe = null;

    // Login
    window.setUsername = function() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!username) return;
      if (password !== SERVER_PASSWORD) {
        document.getElementById('modal-error').style.display = 'block';
        return;
      }
      currentUser = username;
      document.getElementById('modal-overlay').style.display = 'none';
      loadChannels();
      switchChannel('general');
    }

    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') setUsername(); });
    document.getElementById('username-input').addEventListener('keypress', e => { if (e.key === 'Enter') setUsername(); });

    // Load channels from Firestore
    async function loadChannels() {
      const snap = await getDocs(collection(db, "channels"));
      const existing = snap.docs.map(d => d.id);

      // Add defaults if not there
      if (!existing.includes('general')) await setDoc(doc(db, "channels", "general"), { name: "general" });
      if (!existing.includes('random')) await setDoc(doc(db, "channels", "random"), { name: "random" });
      if (!existing.includes('gaming')) await setDoc(doc(db, "channels", "gaming"), { name: "gaming" });

      // Listen for channel changes in real time
      onSnapshot(collection(db, "channels"), (snapshot) => {
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        snapshot.forEach(doc => {
          const name = doc.id;
          const div = document.createElement('div');
          div.className = 'channel' + (name === currentChannel ? ' active' : '');
          div.innerHTML = `# ${name} <span onclick="deleteChannel('${name}', event)">✕</span>`;
          div.onclick = () => switchChannel(name);
          list.appendChild(div);
        });
      });
    }

    // Add new channel
    window.addChannel = async function() {
      const input = document.getElementById('new-channel-input');
      const name = input.value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!name) return;
      await setDoc(doc(db, "channels", name), { name });
      input.value = '';
      switchChannel(name);
    }

    document.getElementById('new-channel-input').addEventListener('keypress', e => { if (e.key === 'Enter') addChannel(); });

    // Delete channel
    window.deleteChannel = async function(name, e) {
      e.stopPropagation();
      if (name === 'general') return alert("Can't delete #general!");
      await deleteDoc(doc(db, "channels", name));
      if (currentChannel === name) switchChannel('general');
    }

    // Switch channel
    function switchChannel(name) {
      currentChannel = name;
      document.getElementById('chat-header').textContent = '# ' + name;
      document.getElementById('msg-input').placeholder = `Message #${name}`;
      document.querySelectorAll('.channel').forEach(el => {
        el.className = 'channel' + (el.textContent.trim().startsWith('# ' + name) ? ' active' : '');
      });

      if (unsubscribe) unsubscribe();

      const q = query(collection(db, "messages"), where("channel", "==", name), orderBy("timestamp"));
      unsubscribe = onSnapshot(q, (snapshot) => {
        const messages = document.getElementById('messages');
        messages.innerHTML = '';
        snapshot.forEach((doc) => {
          const data = doc.data();
          const time = data.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '';
          const msg = document.createElement('div');
          msg.className = 'message';
          msg.innerHTML = `
            <div class="avatar">${data.user[0].toUpperCase()}</div>
            <div class="msg-content">
              <div class="username">${data.user} <span style="color:#6d6f78;font-size:11px;font-weight:400">${time}</span></div>
              <div class="text">${data.text}</div>
            </div>
          `;
          messages.appendChild(msg);
        });
        messages.scrollTop = messages.scrollHeight;
      });
    }

    // Send message
    window.sendMessage = async function() {
      if (!currentUser) return;
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db, "messages"), {
        text,
        user: currentUser,
        channel: currentChannel,
        timestamp: serverTimestamp()
      });
      input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>

</body>
</html>
